{% extends "base.html" %}

{% block title %}Add Customer - {{ config.COMPANY_NAME }}{% endblock %}

{% block content %}
<div class="container-fluid px-3">
    <!-- Page Header -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-2">
        <div>
            <h4 class="fw-bold mb-1">Add Customer</h4>
            <p class="text-muted mb-0">Add a new customer to your database</p>
        </div>
        <div>
            <a href="{{ url_for('customers.list') }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Back
            </a>
        </div>
    </div>
    
    <form method="POST">
        <div class="row g-4">
            <!-- Basic Information -->
            <div class="col-12 col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h6 class="mb-0 fw-bold">Basic Information</h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="customer_code" class="form-label">Customer Code <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="customer_code" name="customer_code" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="customer_name" class="form-label">Customer Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="customer_name" name="customer_name" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="customer_type" class="form-label">Customer Type</label>
                                <select class="form-select" id="customer_type" name="customer_type">
                                    <option value="retail">Retail</option>
                                    <option value="wholesale">Wholesale</option>
                                    <option value="hospital">Hospital</option>
                                    <option value="doctor">Doctor</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="group_id" class="form-label">Group</label>
                                <select class="form-select" id="group_id" name="group_id">
                                    <option value="">Select Group</option>
                                    {% for group in groups %}
                                    <option value="{{ group.id }}">{{ group.group_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="mobile" class="form-label">Mobile</label>
                                <input type="text" class="form-control" id="mobile" name="mobile">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" class="form-control" id="phone" name="phone">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email">
                            </div>
                            <div class="col-12">
                                <label for="address" class="form-label">Address</label>
                                <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" name="city">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" id="state" name="state">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="pincode" class="form-label">Pincode</label>
                                <input type="text" class="form-control" id="pincode" name="pincode">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="gst_no" class="form-label">GST No</label>
                                <input type="text" class="form-control" id="gst_no" name="gst_no">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Sidebar -->
            <div class="col-12 col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h6 class="mb-0 fw-bold">Other Information</h6>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="opening_balance" class="form-label">Opening Balance</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" class="form-control" id="opening_balance" name="opening_balance" step="0.01" value="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="credit_limit" class="form-label">Credit Limit</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" class="form-control" id="credit_limit" name="credit_limit" step="0.01" value="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="dob" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="dob" name="dob">
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" checked>
                            <label class="form-check-label" for="is_active">Active</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i> Save Customer
            </button>
            <a href="{{ url_for('customers.list') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
