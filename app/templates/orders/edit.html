{% extends "base.html" %}

{% block title %}Edit Order {{ order.order_no }} - {{ config.COMPANY_NAME }}{% endblock %}

{% block content %}
<div class="container-fluid px-3">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-2">
        <div>
            <h4 class="fw-bold mb-1"><i class="bi bi-pencil me-2"></i>Edit Purchase Order: {{ order.order_no }}</h4>
            <p class="text-muted mb-0">Update order details and items</p>
        </div>
        <div>
            <a href="{{ url_for('orders.view', order_id=order.id) }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Back
            </a>
        </div>
    </div>

    <form method="POST">
        <div class="card mb-4">
            <div class="card-header">
                <h6 class="mb-0">Order Details</h6>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Supplier</label>
                        <select class="form-select" name="supplier_id" required>
                            {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}" {{ 'selected' if supplier.id == order.supplier_id else '' }}>{{ supplier.account_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Expected Date</label>
                        <input type="date" class="form-control" name="expected_date" value="{{ order.expected_date.strftime('%Y-%m-%d') if order.expected_date else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Remarks</label>
                        <input type="text" class="form-control" name="remarks" value="{{ order.remarks }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <a href="{{ url_for('orders.view', order_id=order.id) }}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i> Update Order
            </button>
        </div>
    </form>
</div>
{% endblock %}
